<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextHost - Құпиясөзді қалпына келтіру</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css?v=1.1">
    <link rel="stylesheet" href="css/theme-styles.css">

    <style>
        /* (оставляю твои стили как есть) */
        .reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }
        
        .background-blur {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: inherit;
            filter: blur(15px);
            z-index: -1;
        }
        
        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 20px;
        }
        
        .reset-card h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .reset-card p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .password-input {
            position: relative;
            margin-bottom: 20px;
        }
        
        .password-input input {
            width: 100%;
            padding: 15px 45px 15px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(248, 248, 248, 0.9);
            outline: none;
        }
        
        .password-input input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s ease;
            padding: 5px;
        }
        
        .toggle-password:hover {
            color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:active {
            transform: translateY(0);
        }
        
        .token-info {
            background: rgba(102, 126, 234, 0.1);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            border-left: 4px solid #667eea;
            font-size: 14px;
            color: #555;
        }
        
        .token-info code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .back-link {
            display: block;
            text-align: center;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            padding: 10px;
        }
        
        .back-link:hover {
            color: #764ba2;
        }
        
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="background-blur"></div>
    
    <div class="reset-container">
        <div class="reset-card">
            <h1>🔐 Жаңа құпиясөз</h1>
            <p>Аккаунтыңыз үшін жаңа құпиясөз енгізіңіз</p>
            
            <div class="token-info" id="tokenInfo">
                <i class="fas fa-key"></i> Қалпына келтіру токені жүктелуде...
            </div>
            
            <form id="resetPasswordForm">
                <input type="hidden" id="resetToken" name="token">
                
                <div class="password-input">
                    <div class="input-label">Жаңа құпиясөз:</div>
                    <input type="password" id="password" name="password" placeholder="Жаңа құпиясөз енгізіңіз" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('password')">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <div class="password-input">
                    <div class="input-label">Құпиясөзді растау:</div>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Құпиясөзді қайта енгізіңіз" required minlength="6">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirm_password')">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-save"></i> Құпиясөзді өзгерту
                </button>
                
                <a href="auth.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Авторизацияға оралу
                </a>
            </form>
        </div>
    </div>

    <!-- Оставляю твою же JS-логику, ничего не меняю -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (token) {
            document.getElementById('resetToken').value = token;
            document.getElementById('tokenInfo').innerHTML = 
                `<i class="fas fa-key"></i> Қалпына келтіру токені: <code>${token.substring(0, 20)}...</code>`;
        } else {
            document.getElementById('tokenInfo').innerHTML = 
                '<span style="color: #dc3545;"><i class="fas fa-exclamation-triangle"></i> Қалпына келтіру сілтемесі қате!</span>';
            setTimeout(() => {
                window.location.href = 'auth.html';
            }, 2000);
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('.submit-btn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Өзгертілуде...';
            submitBtn.disabled = true;
            
            const formData = new FormData(e.target);
            const data = {
                token: formData.get('token'),
                password: formData.get('password'),
                confirm_password: formData.get('confirm_password')
            };

            if (!data.token) {
                alert('❌ Қате: токен табылмады');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            if (!data.password || !data.confirm_password) {
                alert('❌ Барлық өрістерді толтырыңыз');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            if (data.password !== data.confirm_password) {
                alert('❌ Құпиясөздер сәйкес емес!');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            if (data.password.length < 6) {
                alert('❌ Құпиясөз кемінде 6 таңбадан тұруы керек!');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                return;
            }

            try {
                const response = await fetch('backend/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    alert('✅ ' + result.message);
                    window.location.href = 'auth.html';
                } else {
                    alert('❌ ' + result.message);
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                alert('❌ Желі қатесі: ' + error.message);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('password').focus();
    </script>
</body>
</html>
